name: finanzas
description: "Aplicación de finanzas personales nativa para Android (Flutter)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado / DI
  flutter_riverpod: ^2.5.1

  # Base de datos (fork de comunidad de Isar)
  isar_community: ^3.1.8
  isar_community_flutter_libs: ^3.1.8

  # Navegación
  go_router: ^14.2.0

  # Material You / color dinámico
  dynamic_color: ^1.7.0

  # Formateo de números, fechas y divisas
  intl: ^0.20.2

  # Bloqueo de la app con la credencial del dispositivo (huella / PIN del móvil)
  local_auth: ^2.3.0

  # OCR on-device para tickets
  google_mlkit_text_recognition: ^0.13.0

  # Cámara / galería
  image_picker: ^1.1.2

  # Red (cotizaciones Yahoo Finance + FX)
  http: ^1.2.1

  # Almacenamiento / import-export
  path_provider: ^2.1.3
  file_picker: ^8.0.6
  share_plus: ^9.0.0

  # Descomprimir el build de la webapp de escritorio empaquetado como asset
  archive: ^3.6.1

  # Gráficas
  fl_chart: ^0.68.0

  # Informes descargables
  pdf: ^3.11.1
  # Excel con formato condicional, autofiltro y congelar cabecera (XlsIO).
  syncfusion_flutter_xlsio: ^28.2.9

  uuid: ^4.4.0
  cupertino_icons: ^1.0.6
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_community_generator: ^3.1.8

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/webapp.zip
